<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members Gallery - SATYUG HINDU ARMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; padding: 2rem; background: #f8fafc; color: #1e293b; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #ff9933; text-align: center; margin-bottom: 2rem; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        .member-card {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            transition: all 0.3s ease;
        }
        .member-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }
        .member-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ff9933;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            margin: 0 auto 1rem auto;
        }
        .member-name {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 3rem;
            color: #64748b;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Members Gallery</h1>
        <div id="galleryGrid" class="gallery-grid">
            <!-- Members will be loaded here by JavaScript -->
        </div>
        <a href="index.html" class="back-link">&larr; Back to Home</a>
    </div>

    <script>
        function loadMembers() {
            const STORAGE_KEY = 'satyug_recruits';
            const recruits = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const approvedMembers = recruits.filter(r => r.status === 'Approved');
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';

            if (approvedMembers.length === 0) {
                grid.innerHTML = '<p style="text-align:center; color:#64748b; grid-column: 1 / -1;">No approved members yet.</p>';
                return;
            }

            approvedMembers.forEach(member => {
                const card = document.createElement('div');
                card.className = 'member-card';
                const initial = member.name.charAt(0).toUpperCase();
                card.innerHTML = `
                    <div class="member-avatar">${initial}</div>
                    <div class="member-name">${member.name}</div>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = loadMembers;
    </script>
</body>
</html>
